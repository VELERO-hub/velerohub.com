name: Deploy to Hostinger

# Claude modifies the repository -> commit -> this workflow -> SFTP mirror to Hostinger.
# GitHub is the single source of truth: this is a one-way, full mirror (--delete included),
# so anything added or edited directly on Hostinger outside this repo is overwritten on the
# next push, by design — "Hostinger must only serve the production files."

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Mirror repository to Hostinger via SFTP
        env:
          HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          USERNAME: ${{ secrets.HOSTINGER_SSH_USER }}
          PASSWORD: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_PATH }}
        run: |
          lftp -u "$USERNAME,$PASSWORD" sftp://"$HOST":"$PORT" <<EOF
          set sftp:auto-confirm yes
          set mirror:use-pget-n 1
          mirror -R --delete --verbose \
            --exclude-glob .git/*** \
            --exclude-glob .github/*** \
            --exclude .gitignore \
            ./ "$REMOTE_DIR"
          bye
          EOF
