name: Cleanup Wrong Path
on: workflow_dispatch
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Remove stray files
        env:
          HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          USERNAME: ${{ secrets.HOSTINGER_SSH_USER }}
          PASSWORD: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        run: |
          lftp -u "$USERNAME,$PASSWORD" sftp://"$HOST":"$PORT" <<EOF
          set sftp:auto-confirm yes
          rm -f public_html/CNAME public_html/index.html public_html/style.css
          rm -rf public_html/products
          ls public_html
          bye
          EOF
