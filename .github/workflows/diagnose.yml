name: Diagnose Hostinger Path

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: List Hostinger directory structure
        env:
          HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          USERNAME: ${{ secrets.HOSTINGER_SSH_USER }}
          PASSWORD: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        run: |
          lftp -u "$USERNAME,$PASSWORD" sftp://"$HOST":"$PORT" <<EOF
          set sftp:auto-confirm yes
          echo "--- domains/ ---"
          ls domains
          echo "--- domains/velerohub.com/ ---"
          ls domains/velerohub.com
          echo "--- domains/velerohub.com/public_html/ ---"
          ls domains/velerohub.com/public_html
          echo "--- root public_html/ ---"
          ls public_html
          bye
          EOF
